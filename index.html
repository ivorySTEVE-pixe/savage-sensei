<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover lets the app paint into iPhone notch/home-indicator
         areas; safe-area-inset-* env vars then reserve space for them in CSS. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- iOS Safari address bar tint + Add-to-Home-Screen behavior. -->
    <meta name="theme-color" content="#07080e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sensei" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons. iOS prefers PNG for apple-touch-icon, but recent Safari falls
         back to SVG; we ship the SVG and let iOS handle the rest. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>🔥 Savage Sensei — Track Your Study, Consult Your Coach</title>
    <meta name="description" content="A study session tracker with brutally honest AI coaches. Pick a sensei, log your sessions, get real feedback. Built with Gemini." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
