<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="55%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ecfdf5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- soft full moon halo -->
  <circle cx="180" cy="60" r="60" fill="url(#moon)"/>
  <!-- enso (zen circle), open at the top -->
  <path d="M 128 90
           a 50 50 0 1 1 -34 86"
        fill="none" stroke="#ecfdf5" stroke-width="9"
        stroke-linecap="round" opacity="0.92"/>
  <!-- bald monk silhouette -->
  <ellipse cx="128" cy="186" rx="42" ry="14" fill="#022c22" opacity="0.55"/>
  <circle cx="128" cy="158" r="22" fill="#0f3a2c"/>
  <path d="M 90 200 q 38 -28 76 0 v 40 h -76 z" fill="#0f3a2c"/>
  <!-- closed-eye marks -->
  <path d="M 117 156 q 5 4 10 0" stroke="#ecfdf5" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 134 156 q 5 4 10 0" stroke="#ecfdf5" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
