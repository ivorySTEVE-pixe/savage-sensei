<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0612"/>
      <stop offset="100%" stop-color="#1f1b2e"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- distant horizon glow -->
  <ellipse cx="128" cy="240" rx="160" ry="40" fill="#fbbf24" opacity="0.18"/>
  <!-- bicorne pirate hat -->
  <path d="M 40 110
           q 30 -70 88 -50
           q 58 -20 88 50
           q -44 -10 -88 -10
           q -44 0 -88 10 z"
        fill="url(#hat)" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.5"/>
  <!-- skull-and-crossbones badge on hat -->
  <circle cx="128" cy="78" r="10" fill="#fde047"/>
  <rect x="123" y="75" width="2.5" height="3" fill="#1e1b4b"/>
  <rect x="130.5" y="75" width="2.5" height="3" fill="#1e1b4b"/>
  <path d="M 119 88 l 18 0" stroke="#fde047" stroke-width="2" stroke-linecap="round"/>
  <path d="M 121 92 l 14 0" stroke="#fde047" stroke-width="2" stroke-linecap="round"/>
  <!-- face -->
  <ellipse cx="128" cy="150" rx="38" ry="44" fill="#d6c0a3"/>
  <!-- eye patch + strap -->
  <path d="M 70 130 q 30 -8 50 0" stroke="#0a0612" stroke-width="3" fill="none"/>
  <rect x="100" y="135" width="22" height="18" rx="3" fill="#0a0612"/>
  <!-- visible eye -->
  <ellipse cx="146" cy="146" rx="4" ry="3.5" fill="#0a0612"/>
  <!-- mustache -->
  <path d="M 108 172 q 10 8 20 0 q 10 8 20 0" stroke="#3a2415" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- beard -->
  <path d="M 92 184 q 36 32 72 0 q -8 28 -36 30 q -28 -2 -36 -30 z" fill="#3a2415"/>
  <!-- gold hoop earring -->
  <circle cx="166" cy="172" r="4" fill="none" stroke="#fde047" stroke-width="2"/>
</svg>
